<!DOCTYPE html>
<html class="no-js" lang="en">
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
        <meta http-equiv="x-ua-compatible" content="ie=edge">
        <title>Create An Account - Shoplook</title>
        <meta name="description" content="description">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="shortcut icon" href="assets/images/favicon.png" />
        <link rel="stylesheet" href="assets/css/plugins.css">
        <link rel="stylesheet" href="assets/css/style.css">
        <link rel="stylesheet" href="assets/css/responsive.css">
    </head>
    <body class="register-page">
        
        <div class="page-wrapper">
            <header class="header header-1">
                <div class="container">      
                    <div class="logo col-6 col-sm-4 col-md-4 col-lg-3 align-self-center">
                        <a href="index.html">
                            <img src="assets/images/logo.png" alt="Shoplook" />
                        </a>
                    </div>
                </div>
            </header>

            <div id="page-content">    
                <div class="page-header" style="background-image: url(assets/images/page-header/page-banner1.jpg)">
                    <div class="page-title"><h1>Create An Account</h1></div>
                </div>

                <div class="container">
                    <div class="row">
                        <div class="col-12 col-sm-12 col-md-12 col-lg-12 box">	
                            <div class="mb-4">
                                <h3>Personal Information</h3>
                                
                                <form method="post" action="http://localhost:3000/register" accept-charset="UTF-8" class="contact-form">
                                    <div class="row">
                                        <div class="col-12 col-sm-12 col-md-6 col-lg-6 mb-2">
                                            <div class="form-group">
                                                <label for="CustomerFirstName">First Name <span class="required">*</span></label>
                                                <input id="CustomerFirstName" type="text" name="customer[first-name]" placeholder="" required>
                                            </div>
                                        </div>
                                        <div class="col-12 col-sm-12 col-md-6 col-lg-6 mb-2">
                                            <div class="form-group">
                                                <label for="CustomerLastName">Last Name <span class="required">*</span></label>
                                                <input id="CustomerLastName" type="text" name="customer[Last-name]" placeholder="" required>	
                                            </div>
                                        </div>
                                    </div>
                                    <div class="row">
                                        <div class="col-12 col-sm-12 col-md-12 col-lg-12 mb-2">
                                            <div class="form-group">
                                                <label for="CustomerEmail">Email Address <span class="required">*</span></label>
                                                <input id="CustomerEmail" type="email" name="customer[email]" placeholder="" required>	
                                            </div>
                                        </div>
                                    </div>

                                    <hr>
                                    <h3>Login Information</h3>
                                    <div class="row">
                                        <div class="col-12 col-sm-12 col-md-6 col-lg-6 mb-2">	
                                            <div class="form-group">
                                                <label for="CustomerPassword">Password <span class="required">*</span></label>
                                                <input id="CustomerPassword" type="password" name="customer[Password]" placeholder="" required>
                                            </div>
                                        </div>
                                        <div class="col-12 col-sm-12 col-md-6 col-lg-6 mb-2">
                                            <div class="form-group">
                                                <label for="CustomerConfirmPassword">Confirm Password <span class="required">*</span></label>
                                                <input id="CustomerConfirmPassword" type="password" name="customer[ConfirmPassword]" placeholder="" required>	
                                            </div>
                                        </div>
                                    </div>

                                    <div class="row">
                                        <div class="text-left col-6 col-sm-6 col-md-6 col-lg-6 mt-3">
                                            <input type="submit" class="btn mb-3" value="Submit">
                                        </div>
                                        <div class="text-right col-6 col-sm-6 col-md-6 col-lg-6 mt-3">
                                            <a href="login.html">« Back To Login</a>
                                        </div>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="footer footer-1">
                <div class="footer-bottom clearfix">
                    <div class="container text-center">
                        <div class="copytext">&copy; 2026 ShopLook. Master's Group Project.</div>
                    </div>
                </div>
            </div>
        </div>

        <script src="assets/js/vendor/jquery-3.3.1.min.js"></script>
        <script src="assets/js/plugins.js"></script>
        <script src="assets/js/main.js"></script>
    </body>
</html>
